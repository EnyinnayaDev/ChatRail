version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: swiftorder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: swiftorder
      POSTGRES_PASSWORD: swiftorder
      POSTGRES_DB: swiftorder
    ports:
      - "5432:5432"
    volumes:
      - swiftorder_pg:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftorder -d swiftorder"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  swiftorder_pg:
